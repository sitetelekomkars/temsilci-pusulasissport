<div class="control-wrapper">
    <div class="left-panel" style="width: 100%;">
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="Hızlı Ara..." onkeyup="filterContent()">
        </div>
        <div class="filter-container">
            <button class="filter-btn btn-fav" onclick="filterCategory(this, 'fav')"><i class="fas fa-star"></i> </button>
            <button class="filter-btn btn-all active" onclick="filterCategory(this, 'all')"><i class="fas fa-th-large"></i> Tümü</button>
            <button class="filter-btn btn-tech" onclick="filterCategory(this, 'Teknik')"><i class="fas fa-wrench"></i> Teknik</button>
            <button class="filter-btn btn-ikna" onclick="filterCategory(this, 'İkna')"><i class="fas fa-hand-holding-dollar"></i> İkna</button>
            <button class="filter-btn btn-camp" onclick="filterCategory(this, 'Kampanya')"><i class="fas fa-gift"></i> Kampanya</button>
            <button class="filter-btn btn-info" onclick="filterCategory(this, 'Bilgi')"><i class="fas fa-info-circle"></i> Bilgi</button>
            <a href="https://www.ssportplus.com/yayin-akisi/" target="_blank" class="filter-btn btn-stream"><i class="fas fa-calendar-alt"></i> Yayın Akışı</a>
            <button class="filter-btn guide-btn" onclick="openGuide()"> 📖  Spor Rehberi</button>
            <button class="filter-btn wizard-btn" onclick="openWizard()"> ⚖️  İade Asistanı</button>
            <button class="filter-btn sales-btn" onclick="openSales()"> 📞  TeleSatış</button>
            <button class="filter-btn game-btn" onclick="openPenaltyGame()"> ⚽  OYUN</button>
            <button class="filter-btn" onclick="openQualityArea()"><i class="fas fa-microscope"></i> Kalite</button>
        </div>
    </div>
    </div>

<div class="news-ticker-box" onclick="openNews()">
    <div class="ticker-label">
        <i class="fas fa-circle" style="font-size:8px;"></i> GÜNCEL
    </div>
    <div id="ticker-content" class="ticker-content">Veriler yükleniyor...</div>
</div>
