<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S Sport Plus - Temsilci Bilgi Merkezi</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }

        /* === 1. GİRİŞ EKRANI (EN ÜSTTE) === */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0e1b42 0%, #1a2f6e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000; /* En yüksek katman */
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 300px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .login-card h2 { color: #0e1b42; margin: 10px 0; }
        
        .login-input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            box-sizing: border-box;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #fabb00; /* SARI BUTON */
            color: #0e1b42;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .login-btn:hover { background: #e0a800; }
        
        #error-msg {
            color: red;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }

        /* === 2. BAKIM EKRANI (GİRİŞTEN SONRA GELECEK) === */
        #maintenance-screen {
            display: none; /* Başlangıçta gizli */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #f4f6f9;
            z-index: 2000; /* Girişin altında, panelin üstünde */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .maintenance-content {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
        }

        .emoji-icon { font-size: 5rem; margin-bottom: 20px; display: block; }
        
        .maintenance-content h1 { color: #0e1b42; margin-bottom: 15px; }
        
        .maintenance-content p {
            font-size: 1.2rem;
            color: #555;
            line-height: 1.6;
        }

        .sub-text {
            display: block;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #888;
            font-style: italic;
        }

        /* === 3. ANA PANEL (ŞU AN GİZLİ) === */
        #main-app { display: none; }

    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <i class="fas fa-lock fa-3x" style="color: #0e1b42;"></i>
            <h2>S Sport Plus</h2>
            <p>Temsilci Girişi</p>
            <input type="password" id="passInput" class="login-input" placeholder="Şifre" onkeyup="enterBas(event)">
            <button class="login-btn" onclick="girisYap()">Giriş Yap</button>
            <p id="error-msg">Hatalı Şifre!</p>
        </div>
    </div>

    <div id="maintenance-screen">
        <div class="maintenance-content">
            <span class="emoji-icon">👩‍🏫☕</span>
            <h1>Sistem Mola Verdi!</h1>
            <p>
                Şu an pusulamızı yeniden kalibre ediyoruz.<br>
                <strong>Esra Hoca'dan</strong> gelecek kritik bilgileri bekliyoruz... 🚀
            </p>
            <span class="sub-text">(Az sonra buradayız, panik yok!)</span>
        </div>
    </div>

    <div id="main-app">
        </div>

    <script>
        // ŞİFRE BURADA (Küçük harfle)
        const DOGRU_SIFRE = "ssport+";

        function girisYap() {
            var girilen = document.getElementById("passInput").value;
            var hataMesaji = document.getElementById("error-msg");

            if (girilen === DOGRU_SIFRE) {
                // Şifre Doğruysa:
                document.getElementById("login-screen").style.display = "none"; // Girişi kapat
                document.getElementById("maintenance-screen").style.display = "flex"; // Bakımı aç
            } else {
                // Şifre Yanlışsa:
                hataMesaji.style.display = "block";
                // Giriş kutusunu salla (Görsel efekt)
                var card = document.querySelector(".login-card");
                card.style.transform = "translateX(10px)";
                setTimeout(() => { card.style.transform = "translateX(-10px)"; }, 100);
                setTimeout(() => { card.style.transform = "translateX(0)"; }, 200);
            }
        }

        function enterBas(e) {
            if (e.key === "Enter") {
                girisYap();
            }
        }
    </script>

</body>
</html>
